name: Publish to npm

# Triggers on EITHER:
#   1. Pushing a version tag, e.g. `git push --follow-tags` after `npm version patch`.
#   2. Publishing a GitHub Release (Releases -> Draft a new release).
# npm refuses to republish an existing version, so an accidental double-trigger
# for the same version simply no-ops on the second run.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

# Prevent two publish runs for the same version (tag + release) overlapping.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
        name: Build & Publish
        runs-on: ubuntu-latest

        permissions:
            contents: read
            # Required for npm provenance (signed, verifiable builds).
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            # Publishes only if the version in package.json is not already on npm.
            # `prepublishOnly` (clean + build) runs automatically before publish.
            - name: Publish
              run: |
                NAME=$(node -p "require('./package.json').name")
                VERSION=$(node -p "require('./package.json').version")
                if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
                  echo "$NAME@$VERSION is already published — skipping."
                else
                  npm publish --provenance
                fi
